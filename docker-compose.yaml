services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orders_db
      MYSQL_USER: order_user
      MYSQL_PASSWORD: order_pass
    ports:
      - "3306:3306"
    volumes:
      - .docker/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_DSN: order_user:order_pass@tcp(db:3306)/orders_db?parseTime=true
      REST_PORT: "8080"
      GRPC_PORT: "50051"
      GRAPHQL_PORT: "8081"
    ports:
      - "8080:8080"
      - "8081:8081"
      - "50051:50051"

